name: status

on:
  push:
    branches:
      - master
      - stable
  pull_request:
    branches:
      - master
      - stable

permissions:
  contents: read

jobs:
  status_test:
    name: Status plugin (Go ${{ matrix.go }}, PHP ${{ matrix.php }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        php: [ "8.5" ]
        go: [ stable ]
        os: [ "ubuntu-latest" ]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v7 # action page: <https://github.com/actions/setup-go>
        with:
          go-version: ${{ matrix.go }}

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2 # action page: <https://github.com/shivammathur/setup-php>
        with:
          php-version: ${{ matrix.php }}
          extensions: sockets

      - name: Check out code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          cd tests/php_test_files
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Init Composer Cache # Docs: <https://git.io/JfAKn#php---composer>
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: cd tests/php_test_files && composer update --prefer-dist --no-progress --ansi

      - name: Init Go modules Cache # Docs: <https://git.io/JfAKn#go---modules>
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Increase FD limit
        run: |
          echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
          ulimit -n 5000

      - name: Install Go dependencies
        run: go mod download

      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage-ci
          go test -v -race -cover -coverpkg=./... -coverprofile=./coverage-ci/unit.out -covermode=atomic ./...

      - name: Run status e2e tests with coverage
        run: |
          mkdir -p coverage-ci
          cd tests
          go test -timeout 20m -v -race -cover -tags=debug -failfast -coverpkg=github.com/roadrunner-server/status/v6/... -coverprofile=../coverage-ci/e2e.out -covermode=atomic ./...

      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./coverage-ci/

  codecov:
    name: Upload codecov
    runs-on: ubuntu-latest
    needs:
      - status_test
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage
      - name: Prepare coverage reports
        run: |
          for f in coverage/*.out; do
            out="$(basename "${f%.out}").txt"
            echo 'mode: atomic' > "$out"
            awk '
              /^github\.com\/roadrunner-server\/status\/v6\// {
                sub(/^github\.com\/roadrunner-server\/status\/v6\//, "", $0)
                print
              }
            ' "$f" >> "$out"
          done
      - name: upload to codecov
        uses: codecov/codecov-action@v7 # Docs: <https://github.com/codecov/codecov-action>
        with:
          files: unit.txt,e2e.txt
          fail_ci_if_error: false
